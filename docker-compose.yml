services:
  api:
    profiles: ["dev", "prod-sim"]
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: dev
    working_dir: /workspace/backend
    command: /bin/sh -lc "PATH=/usr/local/go/bin:$$PATH GOCACHE=/tmp/go-build go run ./cmd/server"
    env_file:
      - path: .env
        format: raw
    environment:
      API_PORT: ${API_PORT:-8080}
    volumes:
      - .:/workspace
    expose:
      - "${API_PORT:-8080}"

  frontend-dev:
    profiles: ["dev"]
    image: node:22-alpine
    working_dir: /workspace/frontend
    command: /bin/sh -lc "npm install && npm start"
    environment:
      FRONTEND_DEV_PORT: 80
    volumes:
      - .:/workspace
    expose:
      - "80"

  nginx:
    profiles: ["dev"]
    image: nginx:1.27-alpine
    depends_on:
      - api
      - frontend-dev
    ports:
      - "${NGINX_PORT:-11946}:80"
    volumes:
      - ./deploy/nginx/dev.conf:/etc/nginx/conf.d/default.conf:ro

  frontend-prod:
    profiles: ["prod-sim"]
    build:
      context: .
      dockerfile: frontend/Dockerfile
    depends_on:
      - api
    ports:
      - "${NGINX_PORT:-11946}:80"

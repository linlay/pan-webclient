services:
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - path: .env
        format: raw
    environment:
      API_PORT: ${API_PORT:-8080}
    volumes:
      - ./configs:/app/configs:ro
      - ./data:/app/data
    expose:
      - "${API_PORT:-8080}"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    depends_on:
      - api
    ports:
      - "${NGINX_PORT:-11946}:80"

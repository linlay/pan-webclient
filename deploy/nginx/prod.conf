upstream pan_api {
    server api:8080;
}

server {
    listen 80;
    server_name _;
    # Let the backend enforce the configured upload limit from MAX_UPLOAD_BYTES.
    client_max_body_size 0;
    root /usr/share/nginx/html;
    index index.html;

    location = /__pan_spa_index__ {
        internal;
        default_type text/html;
        alias /usr/share/nginx/html/index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0, s-maxage=0" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        add_header CDN-Cache-Control "no-store" always;
        add_header Cloudflare-CDN-Cache-Control "no-store" always;
    }

    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0, s-maxage=0" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        add_header CDN-Cache-Control "no-store" always;
        add_header Cloudflare-CDN-Cache-Control "no-store" always;
    }

    location = / {
        return 302 /pan/;
    }

    location = /pan {
        return 302 /pan/;
    }

    location = /apppan {
        return 302 /apppan/;
    }

    # Stream large files directly from the upstream so PDF viewers can
    # progressively fetch byte ranges without nginx buffering to disk.
    location ~ ^/(pan|apppan)/api/(files/raw|public/shares/[^/]+/(raw|download)|tasks/[^/]+/download)$ {
        rewrite ^/(pan|apppan)/api/(.*)$ /api/$2 break;
        proxy_pass http://pan_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_max_temp_file_size 0;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_force_ranges on;
    }

    # Stream upload bodies directly to the API so nginx does not fully buffer
    # the request to a temp file before the backend starts writing it.
    location ~ ^/(pan|apppan)/api/(uploads|public/shares/[^/]+/uploads)$ {
        rewrite ^/(pan|apppan)/api/(.*)$ /api/$2 break;
        proxy_pass http://pan_api;
        include /etc/nginx/conf.d/api-proxy-params.conf;
        proxy_request_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location ~ ^/(pan|apppan)/api/(.+)$ {
        rewrite ^/(pan|apppan)/api/(.*)$ /api/$2 break;
        proxy_pass http://pan_api;
        include /etc/nginx/conf.d/api-proxy-params.conf;
    }

    location ~ ^/(pan|apppan)/api$ {
        rewrite ^ /api break;
        proxy_pass http://pan_api;
        include /etc/nginx/conf.d/api-proxy-params.conf;
    }

    location ~* "^/(pan|apppan)/.+\\.[0-9a-f]{8}(?:\\.chunk)?\\.(?:js|css|woff2?|png|jpe?g|gif|svg|eot|ttf|otf)$" {
        rewrite ^/(pan|apppan)/(.*)$ /$2 break;
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        try_files $uri =404;
    }

    location /pan/ {
        rewrite ^/pan/(.*)$ /$1 break;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0, s-maxage=0" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        add_header CDN-Cache-Control "no-store" always;
        add_header Cloudflare-CDN-Cache-Control "no-store" always;
        try_files $uri /__pan_spa_index__;
    }

    location /apppan/ {
        rewrite ^/apppan/(.*)$ /$1 break;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0, s-maxage=0" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        add_header CDN-Cache-Control "no-store" always;
        add_header Cloudflare-CDN-Cache-Control "no-store" always;
        try_files $uri /__pan_spa_index__;
    }

    location / {
        return 404;
    }
}

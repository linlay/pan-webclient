upstream pan_api {
    server api:8080;
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location = / {
        return 302 /pan/;
    }

    location = /pan {
        return 302 /pan/;
    }

    location = /apppan {
        return 302 /apppan/;
    }

    location /pan/api/ {
        rewrite ^/pan/api/(.*)$ /api/$1 break;
        proxy_pass http://pan_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /pan/api {
        rewrite ^ /api break;
        proxy_pass http://pan_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /apppan/api/ {
        rewrite ^/apppan/api/(.*)$ /api/$1 break;
        proxy_pass http://pan_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /apppan/api {
        rewrite ^ /api break;
        proxy_pass http://pan_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /pan/ {
        rewrite ^/pan/(.*)$ /$1 break;
        try_files $uri $uri/ /index.html;
    }

    location /apppan/ {
        rewrite ^/apppan/(.*)$ /$1 break;
        try_files $uri $uri/ /index.html;
    }

    location / {
        return 404;
    }
}

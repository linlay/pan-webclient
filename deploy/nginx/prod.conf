upstream pan_api {
    server api:8080;
}

server {
    listen 80;
    server_name _;
    # Let the backend enforce the configured upload limit from MAX_UPLOAD_BYTES.
    client_max_body_size 0;
    root /usr/share/nginx/html;
    index index.html;

    location = /__pan_spa_index__ {
        internal;
        default_type text/html;
        alias /usr/share/nginx/html/index.html;
    }

    location = / {
        return 302 /pan/;
    }

    location = /pan {
        return 302 /pan/;
    }

    location = /apppan {
        return 302 /apppan/;
    }

    # Stream large files directly from the upstream so PDF viewers can
    # progressively fetch byte ranges without nginx buffering to disk.
    location ~ ^/(pan|apppan)/api/(files/raw|public/shares/[^/]+/(raw|download)|tasks/[^/]+/download)$ {
        rewrite ^/(pan|apppan)/api/(.*)$ /api/$2 break;
        proxy_pass http://pan_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_max_temp_file_size 0;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_force_ranges on;
    }

    location /pan/api/ {
        rewrite ^/pan/api/(.*)$ /api/$1 break;
        proxy_pass http://pan_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /pan/api {
        rewrite ^ /api break;
        proxy_pass http://pan_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /apppan/api/ {
        rewrite ^/apppan/api/(.*)$ /api/$1 break;
        proxy_pass http://pan_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /apppan/api {
        rewrite ^ /api break;
        proxy_pass http://pan_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /pan/ {
        rewrite ^/pan/(.*)$ /$1 break;
        try_files $uri /__pan_spa_index__;
    }

    location /apppan/ {
        rewrite ^/apppan/(.*)$ /$1 break;
        try_files $uri /__pan_spa_index__;
    }

    location / {
        return 404;
    }
}

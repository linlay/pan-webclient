map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

upstream pan_api {
    server api:8080;
}

upstream pan_frontend_dev {
    server frontend-dev:80;
}

server {
    listen 80;
    server_name _;

    location = / {
        return 302 /pan/;
    }

    location = /pan {
        return 302 /pan/;
    }

    location = /apppan {
        return 302 /apppan/;
    }

    location /pan/api/ {
        rewrite ^/pan/api/(.*)$ /api/$1 break;
        proxy_pass http://pan_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    location = /pan/api {
        rewrite ^ /api break;
        proxy_pass http://pan_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /apppan/api/ {
        rewrite ^/apppan/api/(.*)$ /api/$1 break;
        proxy_pass http://pan_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    location = /apppan/api {
        rewrite ^ /api break;
        proxy_pass http://pan_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://pan_frontend_dev;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}

name: pan-webclient

services:
  api:
    container_name: pan-webclient-backend
    image: pan-webclient-backend:${PAN_VERSION:-latest}
    env_file:
      - path: .env
        format: raw
    environment:
      API_PORT: ${API_PORT:-8080}
    volumes:
      - ./configs:/app/configs:ro
      - ./data:/app/data
    expose:
      - "${API_PORT:-8080}"

  frontend:
    container_name: pan-webclient-frontend
    image: pan-webclient-frontend:${PAN_VERSION:-latest}
    depends_on:
      - api
    ports:
      - "${NGINX_PORT:-11946}:80"
